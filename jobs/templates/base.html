<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Monitor Paraná{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f8; color: #333; }
        .navbar { background-color: #1a73e8; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; color: #fff !important; }
        footer { background-color: #fff; border-top: 1px solid #dee2e6; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'job_list' %}">JobMonitor Paraná</a>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-3 mt-5">
        <div class="container text-center text-muted small">
            © 2026 JobMonitor — Agregador de empleo en Paraná, Entre Ríos
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
